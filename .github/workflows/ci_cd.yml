name: vtrade

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: "Set up Python"
      uses: actions/setup-python@v6
      with:
        python-version-file: "pyproject.toml"

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install the project
      run: |
        uv sync --locked --all-extras --dev
        uv run playwright install --with-deps

    - name: Run tests
      run: uv run pytest tests

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-tests-report
        path: test-results/
        retention-days: 10

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platform: linux/arm64/v8
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/vtrade:arm64

  build-amd64:
    runs-on: ubuntu-24.04
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/vtrade:x86_64

  deploy:
    runs-on: ubuntu-24.04
    needs: [build-arm64]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_KEY }}
        port: 22
        script: |
          VPS_ARCH=$(uname -m)
          CONTAINER_NAME="vtrade"
          ARM64_IMG="${{ secrets.DOCKER_USERNAME }}/vtrade:arm64"
          if [ "$VPS_ARCH" == "aarch64" ]; then
            docker pull $ARM64_IMG
            docker stop $CONTAINER_NAME
            docker rm $CONTAINER_NAME
            docker run -d --name $CONTAINER_NAME -p 8050:8050 --network='host' $ARM64_IMG
          else
            echo "Unsupported architecture: $VPS_ARCH"
            exit 1
          fi