version: '3.9'
services:
  dashboard:
    image: viettrann/vtrade:x86_64
    ports:
      - 8050:8050
    depends_on:
      - processor
    network_mode: host

  processor:
    image: viettrann/str-proc:x86_64
    ports:
      - 8000:8000
    network_mode: host
  
  fundamental:
    image: viettrann/fundamental:latest
    ports:
      - 3000:3000
    network_mode: host