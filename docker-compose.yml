version: '3.9'
services:
  vtrade:
    build: .
    ports:
      - 8050:8050
    depends_on:
      - strategy-processor
      - fundamental

  strategy-processor:
    image: viettrann/str-proc:x86_64
    ports:
      - 8000:8000
  
  fundamental:
    image: viettrann/fundamental:latest
    ports:
      - 3000:3000